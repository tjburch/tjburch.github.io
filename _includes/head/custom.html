<!-- start custom head snippets -->

<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1a1a1a">

<!-- Nostalgia Mode - Early initialization to prevent flash -->
<script>
  if (sessionStorage.getItem('nostalgiaMode') === 'true') {
    document.documentElement.classList.add('nostalgia-mode');
  }
</script>

<!-- Taco Mode - Early initialization to prevent flash -->
<script>
  if (sessionStorage.getItem('tacoMode') === 'true') {
    document.documentElement.classList.add('taco-mode');
  }
</script>

<!-- MathJax v3 -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Lazy-load post-body images -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.page__content img').forEach(function (img) {
      if (!img.loading) img.loading = 'lazy';
    });
  });
</script>

<!-- end custom head snippets -->
